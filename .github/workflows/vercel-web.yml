name: Vercel Web Deploy

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/vercel-web.yml"
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "apps/web/vercel.json"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/vercel-web.yml"
      - "apps/web/**"
      - "packages/shared/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "apps/web/vercel.json"

permissions:
  contents: read

concurrency:
  group: vercel-web-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Preview deployment
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: vercel-preview
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Check Vercel secrets
        id: vercel-secrets
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Vercel preview deployment because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
          fi

      - name: Link Vercel project
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: |
          mkdir -p apps/web/.vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > apps/web/.vercel/project.json

      - name: Pull Vercel preview environment
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel pull --yes --environment=preview --cwd apps/web --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel build --cwd apps/web --token="$VERCEL_TOKEN"

      - name: Deploy preview
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel deploy --prebuilt --archive=tgz --cwd apps/web --token="$VERCEL_TOKEN"

  production:
    name: Production deployment
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: vercel-production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Check Vercel secrets
        id: vercel-secrets
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Vercel production deployment because VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID is not configured."
          fi

      - name: Link Vercel project
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: |
          mkdir -p apps/web/.vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > apps/web/.vercel/project.json

      - name: Pull Vercel production environment
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --cwd apps/web --token="$VERCEL_TOKEN"

      - name: Build Vercel output
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel build --prod --cwd apps/web --token="$VERCEL_TOKEN"

      - name: Deploy production
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --archive=tgz --cwd apps/web --token="$VERCEL_TOKEN"
